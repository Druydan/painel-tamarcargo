<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>TAMAR CARGO TRANSPORTES</title>
    
    <meta property="og:title" content="TAMAR CARGO TRANSPORTES">
    <meta property="og:description" content="Sistema de Gestão Logística">
    <meta property="og:image" content="https://druydan.github.io/painel-tamarcargo/logo.png">
    <meta property="og:type" content="website">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        :root {
            --bg-dark: #0a0f1e; --bg-panel: #111827; --text-main: #f8fafc; --text-muted: #94a3b8; 
            --accent-tamar: #3b82f6; --success: #22c55e; --error: #ef4444; --border: #2e374d;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: var(--bg-dark); font-family: 'Segoe UI', Roboto, sans-serif; color: var(--text-main); }
        iframe { width: 100%; height: 100%; border: none; }
        
        #scanner-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 15, 30, 0.98); backdrop-filter: blur(8px); z-index: 9999; 
            flex-direction: column; justify-content: start; align-items: center; padding-top: 25px; box-sizing: border-box;
        }

        #scanner-header { 
            width: 90%; max-width: 400px; background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 16px; padding: 15px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        #scan-instrucao-container {
            text-align: center; background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--accent-tamar);
            padding: 6px; border-radius: 6px; margin-bottom: 12px; transition: all 0.3s;
        }
        #scan-instrucao { font-size: 12px; font-weight: 900; color: var(--accent-tamar); text-transform: uppercase; letter-spacing: 1px; }

        .header-body { display: flex; justify-content: space-between; align-items: stretch; width: 100%; overflow: hidden;}

        /* AQUI ESTÁ A CORREÇÃO DE LAYOUT QUE IMPEDE O TEXTO DE SUMIR */
        .header-left { 
            flex: 1; padding-right: 15px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            overflow: hidden; 
        }
        
        #scan-sku { font-size: 16px; font-weight: 900; color: var(--text-main); letter-spacing: 0.5px; transition: color 0.3s; }
        
        /* CORREÇÃO DO BUG VISUAL: Removido o -webkit-box, agora ele ocupa o espaço fixo de forma segura */
        #scan-desc { 
            font-size: 11px; font-weight: 600; color: var(--text-muted); margin-top: 4px; line-height: 1.3; 
            display: block; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        .header-right { display: flex; gap: 10px; align-items: center; border-left: 1px solid var(--border); padding-left: 15px; justify-content: center; min-width: 80px;}
        .endereco-box { text-align: center; width: 100%; }
        .endereco-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        #scan-endereco { font-size: 18px; font-weight: 900; color: var(--text-main); margin-top: 2px; transition: color 0.3s; }

        #scanner-card {
            background: var(--bg-panel); padding: 15px; border-radius: 20px; width: 90%; max-width: 400px; 
            border: 1px solid var(--border); transition: all 0.2s ease-in-out;
        }

        .glow-success { box-shadow: 0 0 25px 5px rgba(34, 197, 94, 0.4) !important; border-color: var(--success) !important; }
        .glow-error { box-shadow: 0 0 25px 5px rgba(239, 68, 68, 0.4) !important; border-color: var(--error) !important; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-12px); } 50% { transform: translateX(12px); } 75% { transform: translateX(-12px); } }
        .shake-animation { animation: shake 0.4s ease-in-out; }

        #leitor-container { 
            position: relative; width: 100%; border-radius: 12px; overflow: hidden; 
            border: 2px solid var(--accent-tamar); background: #000; margin-bottom: 10px; aspect-ratio: 1/1;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        #leitor-qr { width: 100%; height: 100%; }
        
        .scan-line {
            position: absolute; left: 5%; width: 90%; height: 2px; background: var(--accent-tamar); 
            box-shadow: 0 0 15px 2px var(--accent-tamar); animation: laser-scan 2s linear infinite; opacity: 0.8;
        }
        @keyframes laser-scan { 0% { top: 5%; } 50% { top: 95%; } 100% { top: 5%; } }

        #scanner-feedback { color: var(--error); font-weight: bold; font-size: 14px; text-align: center; height: 20px; opacity: 0; transition: opacity 0.2s; margin-bottom: 10px; text-transform: uppercase; }

        #btn-cancel { 
            width: 100%; padding: 16px; background: transparent; color: var(--text-muted); 
            border: 1px solid var(--border); border-radius: 12px; font-weight: 700; font-size: 14px; 
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
        }
    </style>
</head>
<body>
    
    <iframe id="iframe-wms" src="https://script.google.com/macros/s/AKfycbw8ymyRRR-SmraPN0xwRPFQsT-E6vJNOBng51t1DG3CHYNiHUlAEOuvIcVQapaU9OfrDg/exec" allow="camera; microphone"></iframe>

    <div id="scanner-overlay">
        <div id="scanner-header">
            <div id="scan-instrucao-container">
                <span id="scan-instrucao">AÇÃO</span>
            </div>
            <div class="header-body">
                <div class="header-left">
                    <div id="scan-sku">---</div>
                    <div id="scan-desc">Carregando...</div>
                </div>
                <div class="header-right">
                    <div class="endereco-box">
                        <div class="endereco-label">Endereço</div>
                        <div id="scan-endereco">---</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="scanner-card">
            <div id="leitor-container">
                <div id="leitor-qr"></div>
                <div class="scan-line" id="scan-laser"></div>
            </div>
            <div id="scanner-feedback">Código Inválido</div>
            <button id="btn-cancel" onclick="fecharCameraGitHub()">CANCELAR</button>
        </div>
    </div>

    <audio id="audio-success" src="https://www.soundjay.com/button/beep-07.wav" preload="auto"></audio>
    <audio id="audio-error" src="https://www.soundjay.com/button/beep-10.wav" preload="auto"></audio>

    <script>
        let leitorAoVivo = null;
        let rotaDoGoogle = null; 
        let isProcessing = false; 
        let passoAtivoDaCamera = "ENDERECO"; 

        window.addEventListener("message", function(event) {
            if (event.data && event.data.acao === "ABRIR_CAMERA") {
                rotaDoGoogle = event.source; 
                atualizarTextos(event.data.contexto);
                abrirCameraGitHub();
            } 
            else if (event.data && event.data.acao === "FEEDBACK_SCAN") {
                processarFeedbackDoGoogle(event.data);
            }
        });

        // AQUI ESTÁ A CORREÇÃO DE LÓGICA: Só altera se realmente veio preenchido
        function atualizarTextos(ctx) {
            if (!ctx) return;
            
            if (ctx.sku && ctx.sku !== "") document.getElementById('scan-sku').innerText = ctx.sku;
            if (ctx.descricao && ctx.descricao !== "") document.getElementById('scan-desc').innerText = ctx.descricao;
            if (ctx.endereco && ctx.endereco !== "") document.getElementById('scan-endereco').innerText = ctx.endereco;
            if (ctx.titulo && ctx.titulo !== "") document.getElementById('scan-instrucao').innerText = ctx.titulo;
            
            if (ctx.passo) {
                passoAtivoDaCamera = ctx.passo;
            } else if (ctx.titulo) {
                passoAtivoDaCamera = ctx.titulo.includes("ENDEREÇO") ? "ENDERECO" : "SKU";
            }
        }

        function abrirCameraGitHub() {
            document.getElementById('scanner-overlay').style.display = 'flex';
            isProcessing = false;

            if (!leitorAoVivo) {
                leitorAoVivo = new Html5Qrcode("leitor-qr");
                leitorAoVivo.start(
                    { facingMode: "environment" }, 
                    { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 }, 
                    function(codigoLido) {
                        if(isProcessing) return; 
                        
                        isProcessing = true;
                        if(leitorAoVivo.getState() === 2) leitorAoVivo.pause(true); 

                        document.getElementById('scan-laser').style.display = 'none';

                        if (rotaDoGoogle) {
                            rotaDoGoogle.postMessage({ acao: "QR_LIDO", codigo: codigoLido }, "*");
                        }
                    },
                    function(erro) {}
                ).catch(err => {
                    alert("Erro ao abrir câmera. Verifique as permissões.");
                    fecharCameraGitHub();
                });
            } else if (leitorAoVivo.getState() === 3) { 
                leitorAoVivo.resume();
                document.getElementById('scan-laser').style.display = 'block';
            }
        }

        function processarFeedbackDoGoogle(dados) {
            const container = document.getElementById('leitor-container');
            const card = document.getElementById('scanner-card');
            const feedbackMsg = document.getElementById('scanner-feedback');
            const laser = document.getElementById('scan-laser');
            const instrucaoBox = document.getElementById('scan-instrucao-container');
            
            const elementoAlvo = document.getElementById(passoAtivoDaCamera === "SKU" ? 'scan-sku' : 'scan-endereco');

            if (dados.status === "SUCESSO_CONTINUAR") {
                document.getElementById('audio-success').play().catch(e=>{});
                container.classList.add('glow-success');
                
                elementoAlvo.style.color = "var(--success)";
                instrucaoBox.style.background = "rgba(34, 197, 94, 0.1)";
                instrucaoBox.style.borderColor = "var(--success)";
                document.getElementById('scan-instrucao').style.color = "var(--success)";
                
                setTimeout(() => {
                    container.classList.remove('glow-success');
                    elementoAlvo.style.color = "var(--text-main)"; 
                    
                    instrucaoBox.style.background = "rgba(59, 130, 246, 0.1)";
                    instrucaoBox.style.borderColor = "var(--accent-tamar)";
                    document.getElementById('scan-instrucao').style.color = "var(--accent-tamar)";
                    
                    atualizarTextos(dados.contexto); 
                    
                    isProcessing = false;
                    laser.style.display = 'block';
                    if(leitorAoVivo.getState() === 3) leitorAoVivo.resume();
                }, 600);

            } else if (dados.status === "SUCESSO_FECHAR") {
                document.getElementById('audio-success').play().catch(e=>{});
                container.classList.add('glow-success');
                elementoAlvo.style.color = "var(--success)";
                
                setTimeout(() => {
                    container.classList.remove('glow-success');
                    elementoAlvo.style.color = "var(--text-main)";
                    fecharCameraGitHub();
                }, 600);

            } else if (dados.status === "ERRO") {
                document.getElementById('audio-error').play().catch(e=>{});
                
                card.classList.add('shake-animation');
                container.classList.add('glow-error');
                elementoAlvo.style.color = "var(--error)";
                
                instrucaoBox.style.background = "rgba(239, 68, 68, 0.1)";
                instrucaoBox.style.borderColor = "var(--error)";
                document.getElementById('scan-instrucao').style.color = "var(--error)";
                
                let msgDireta = passoAtivoDaCamera === "ENDERECO" ? "ENDEREÇO INCORRETO!" : "CÓDIGO INCORRETO!";
                feedbackMsg.innerText = msgDireta;
                feedbackMsg.style.opacity = "1";
                
                setTimeout(() => {
                    card.classList.remove('shake-animation');
                    container.classList.remove('glow-error');
                    elementoAlvo.style.color = "var(--text-main)";
                    
                    instrucaoBox.style.background = "rgba(59, 130, 246, 0.1)";
                    instrucaoBox.style.borderColor = "var(--accent-tamar)";
                    document.getElementById('scan-instrucao').style.color = "var(--accent-tamar)";
                    
                    feedbackMsg.style.opacity = "0";
                    
                    isProcessing = false;
                    laser.style.display = 'block';
                    if(leitorAoVivo.getState() === 3) leitorAoVivo.resume();
                }, 1000);
            }
        }

        function fecharCameraGitHub() {
            document.getElementById('scanner-overlay').style.display = 'none';
            if (leitorAoVivo && leitorAoVivo.isScanning) {
                leitorAoVivo.stop().then(() => {
                    leitorAoVivo.clear();
                    leitorAoVivo = null;
                }).catch(e => console.log(e));
            }
        }
    </script>
</body>
</html>
