<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>TAMAR CARGO TRANSPORTES</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png">
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #00325d; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* A interface da Câmera que vai sobrepor o sistema quando solicitada */
        #leitor-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 32, 93, 0.95); z-index: 9999; flex-direction: column; 
            justify-content: center; align-items: center;
        }
        #leitor-container { width: 90%; max-width: 400px; background: #000; border-radius: 12px; overflow: hidden; border: 3px solid #22c55e; }
        #btn-fechar { margin-top: 20px; padding: 15px 30px; background: #ef4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    
    <iframe id="iframe-wms" src="https://script.google.com/macros/s/AKfycbw8ymyRRR-SmraPN0xwRPFQsT-E6vJNOBng51t1DG3CHYNiHUlAEOuvIcVQapaU9OfrDg/exec" allow="camera; microphone"></iframe>

    <div id="leitor-overlay">
        <h3 style="color: white; margin-bottom: 15px;">Aponte para o QR Code</h3>
        <div id="leitor-container">
            <div id="leitor-qr"></div>
        </div>
        <button id="btn-fechar" onclick="fecharCameraGitHub()">CANCELAR</button>
    </div>

    <script>
        let leitorAoVivo = null;
        let rotaDoGoogle = null; // Vai guardar a rota exata da caixa mais funda

        // Fica escutando as mensagens
        window.addEventListener("message", function(event) {
            if (event.data === "ABRIR_CAMERA") {
                // Guarda a referência de quem chamou para sabermos para onde devolver
                rotaDoGoogle = event.source; 
                abrirCameraGitHub();
            }
        });

        function abrirCameraGitHub() {
            document.getElementById('leitor-overlay').style.display = 'flex';
            if (!leitorAoVivo) leitorAoVivo = new Html5Qrcode("leitor-qr");
            
            leitorAoVivo.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } }, 
                function(codigoLido) {
                    fecharCameraGitHub();
                    
                    // DEVOLVE A INFORMAÇÃO USANDO A ROTA EXATA!
                    if (rotaDoGoogle) {
                        rotaDoGoogle.postMessage({ acao: "QR_LIDO", codigo: codigoLido }, "*");
                    }
                },
                function(erro) {
                    // Ignora falhas de foco na imagem
                }
            ).catch(err => {
                alert("Erro ao abrir câmera: Verifique se o site está com HTTPS e se você deu permissão.");
                fecharCameraGitHub();
            });
        }

        function fecharCameraGitHub() {
            document.getElementById('leitor-overlay').style.display = 'none';
            if (leitorAoVivo && leitorAoVivo.isScanning) {
                leitorAoVivo.stop().catch(e => console.log(e));
            }
        }
    </script>
</body>
</html>
